
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Memories</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f0e0c;color:#f0e8d8;font-family:'DM Sans',sans-serif;min-height:100vh}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    .spinner{width:22px;height:22px;border:2px solid rgba(212,168,83,0.3);border-top-color:#d4a853;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
    .fade{animation:fadeIn .4s ease both}
    header{padding:32px 24px 24px;border-bottom:1px solid rgba(240,232,216,0.08);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .eyebrow{font-family:'DM Mono',monospace;font-size:11px;color:#d4a853;letter-spacing:2px;margin-bottom:6px}
    h1{font-family:'DM Serif Display',serif;font-size:clamp(26px,5vw,44px);font-weight:400}
    main{padding:32px 24px;max-width:1100px;margin:0 auto}
    .card{background:#1c1a17;border-radius:12px;border:1px solid rgba(240,232,216,0.08);padding:22px;margin-bottom:32px}
    .card-title{font-family:'DM Serif Display',serif;font-size:19px;color:#d4a853;margin-bottom:4px}
    .card-sub{font-family:'DM Mono',monospace;font-size:10px;color:rgba(240,232,216,0.35);letter-spacing:.5px;margin-bottom:16px}
    input{background:rgba(240,232,216,0.06);border:1px solid rgba(240,232,216,0.15);border-radius:8px;color:#f0e8d8;font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 13px;outline:none;transition:border .2s;width:100%}
    input:focus{border-color:#d4a853}
    input::placeholder{color:rgba(240,232,216,0.3)}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .btn{border:none;border-radius:8px;cursor:pointer;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;padding:11px 20px;transition:all .15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
    .btn:active{transform:scale(0.97)}
    .gold{background:#d4a853;color:#0f0e0c}
    .gold:hover{background:#e8be6a}
    .gold:disabled{background:#5a4a28;color:#8a7a5a;cursor:not-allowed}
    .ghost{background:rgba(240,232,216,0.08);color:#f0e8d8;border:1px solid rgba(240,232,216,0.15)}
    .ghost:hover{background:rgba(240,232,216,0.14)}
    .danger{background:rgba(224,112,112,0.1);color:#e07070;border:1px solid rgba(224,112,112,0.3)}
    .danger:hover{background:rgba(224,112,112,0.2)}
    .msg{font-family:'DM Mono',monospace;font-size:12px;margin-top:10px;padding:8px 12px;border-radius:6px}
    .err{color:#e07070;background:rgba(224,112,112,0.08);border:1px solid rgba(224,112,112,0.2)}
    .ok{color:#70c070;background:rgba(112,192,112,0.08);border:1px solid rgba(112,192,112,0.2)}
    .drop{border:1.5px dashed rgba(240,232,216,0.2);border-radius:8px;padding:26px;text-align:center;cursor:pointer;margin-bottom:14px;transition:all .2s}
    .drop:hover,.drop.drag{border-color:#d4a853;background:rgba(212,168,83,0.05)}
    .drop-icon{font-size:28px;margin-bottom:8px}
    .drop-txt{color:rgba(240,232,216,0.45);font-size:14px}
    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
    .pcard{background:#1c1a17;border-radius:4px;overflow:hidden;border:1px solid rgba(240,232,216,0.07);box-shadow:0 4px 20px rgba(0,0,0,0.35);cursor:pointer;transition:transform .2s}
    .pcard:hover{transform:scale(1.02)}
    .pcard img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;filter:sepia(6%)}
    .pinfo{padding:11px 13px 13px}
    .pcap{font-size:13px;margin-bottom:4px;line-height:1.4}
    .pdate{font-family:'DM Mono',monospace;font-size:10px;color:rgba(240,232,216,0.3)}
    .empty{text-align:center;padding:60px 0;color:rgba(240,232,216,0.2)}
    .empty p{font-family:'DM Serif Display',serif;font-size:20px;font-style:italic}
    .overlay{position:fixed;inset:0;background:rgba(8,7,6,0.93);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;animation:fadeIn .2s ease}
    .lbox{max-width:820px;width:100%;text-align:center}
    .lbox img{max-height:70vh;max-width:100%;border-radius:4px;filter:sepia(4%)}
    .lbox-act{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px;align-items:center}
    .lbox-cap{color:#f0e8d8;font-size:14px;margin-bottom:8px}
    .modal{background:#1a1916;border-radius:12px;padding:26px;border:1px solid rgba(240,232,216,0.1);max-width:310px;width:100%}
    .modal h3{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:4px}
    .modal-sub{font-family:'DM Mono',monospace;font-size:10px;color:rgba(240,232,216,0.3);margin-bottom:16px}
    #error-banner{display:none;background:#2a1515;border:1px solid rgba(224,112,112,0.3);color:#e07070;font-family:'DM Mono',monospace;font-size:12px;padding:12px 16px;text-align:center}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:#3a3228;border-radius:3px}
    @media(max-width:480px){header,main{padding:20px 14px}.card{padding:16px}}
  </style>
</head>
<body>

<div id="error-banner"></div>

<header>
  <div>
    <p class="eyebrow">CLASS OF 2025</p>
    <h1>Our Memories</h1>
  </div>
  <div class="row">
    <span style="font-family:'DM Mono',monospace;font-size:12px;color:rgba(240,232,216,0.35)" id="photo-count"></span>
    <span id="admin-badge" style="display:none;font-family:'DM Mono',monospace;font-size:11px;color:#d4a853">⚙ ADMIN</span>
    <button class="btn ghost" id="admin-btn" style="font-size:11px;padding:7px 13px">Admin</button>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-title">Add Memories</div>
    <div class="card-sub" id="card-sub">CLASSMATES ONLY — ENTER PASSWORD TO UPLOAD</div>
    <div id="pass-section">
      <div class="row" style="max-width:340px" id="pass-row">
        <input type="password" id="class-pw" placeholder="Class password…" style="flex:1" />
        <button class="btn gold" id="unlock-btn">Unlock →</button>
      </div>
      <div class="msg err" id="pass-err" style="display:none">Wrong password. Ask a classmate.</div>
    </div>
    <div id="upload-section" style="display:none">
      <div class="drop" id="dropzone">
        <div class="drop-icon">📷</div>
        <div class="drop-txt" id="drop-txt">Tap to choose photos</div>
      </div>
      <input type="file" id="file-input" accept="image/*" multiple style="display:none" />
      <input type="text" id="caption" placeholder="Caption (optional)…" style="margin-bottom:12px" />
      <div class="row">
        <button class="btn gold" id="upload-btn">Upload Photos</button>
        <span class="spinner" id="up-spin" style="display:none"></span>
      </div>
      <div class="msg err" id="up-err" style="display:none"></div>
      <div class="msg ok" id="up-ok" style="display:none">✓ Uploaded successfully!</div>
    </div>
  </div>

  <div style="margin-bottom:24px">
    <input type="text" id="search" placeholder="Search captions…" style="max-width:280px" />
  </div>

  <div id="loading" style="text-align:center;padding:50px"><span class="spinner"></span></div>
  <div class="gallery" id="gallery" style="display:none"></div>
  <div class="empty" id="empty" style="display:none"><p>No memories yet!</p></div>
</main>

<!-- Lightbox -->
<div class="overlay" id="lightbox" style="display:none">
  <div class="lbox">
    <img id="lb-img" src="" alt="" />
    <p class="lbox-cap" id="lb-cap"></p>
    <div class="lbox-act">
      <button class="btn gold" id="dl-btn">↓ Download</button>
      <button class="btn danger" id="del-btn" style="display:none">🗑 Delete</button>
      <button class="btn ghost" id="lb-close">Close</button>
    </div>
    <div id="del-confirm" style="display:none;margin-top:12px" class="row">
      <span style="font-family:'DM Mono',monospace;font-size:12px;color:#e07070">Sure? Cannot undo.</span>
      <button class="btn danger" id="del-yes">Yes, delete</button>
      <button class="btn ghost" id="del-no">Cancel</button>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div class="overlay" id="admin-modal" style="display:none">
  <div class="modal">
    <h3>Admin Login</h3>
    <p class="modal-sub">ONLY YOU HAVE THIS PASSWORD</p>
    <input type="password" id="admin-pw" placeholder="Admin password…" style="margin-bottom:12px" />
    <div class="msg err" id="admin-err" style="display:none">Wrong password.</div>
    <div class="row" style="margin-top:12px">
      <button class="btn gold" id="admin-login-btn" style="flex:1">Login</button>
      <button class="btn ghost" id="admin-cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  EDIT ONLY THESE 4 LINES
// ══════════════════════════════════════════════
var SUPA_URL   = "https://ysrqsrtaedwjnudutnoj.supabase.co";
var SUPA_KEY   = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzcnFzcnRhZWR3am51ZHV0bm9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzgwNDMsImV4cCI6MjA5MDM1NDA0M30.mNnSuTQhb696XXwgcGXFIfaR39tuHVDKmAy6GVJ8uUo";
var CLASS_PASS = "memories2025";
var ADMIN_PASS = "admin@delete999";
// ══════════════════════════════════════════════

var BUCKET = "memories";
var db, allPhotos = [], currentPhoto = null;
var isAdmin = sessionStorage.getItem("cm_admin") === "1";
var isUnlocked = sessionStorage.getItem("cm_unlocked") === "1";

function showBanner(msg) {
  var b = document.getElementById("error-banner");
  b.textContent = "ERROR: " + msg;
  b.style.display = "block";
}

function el(id) { return document.getElementById(id); }

// Dynamically load Supabase CDN
var script = document.createElement("script");
script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
script.onload = function() {
  try {
    if (SUPA_URL.indexOf("PASTE") !== -1) { showBanner("Replace PASTE_YOUR_SUPABASE_URL_HERE in index.html"); el("loading").style.display="none"; return; }
    if (SUPA_KEY.indexOf("PASTE") !== -1) { showBanner("Replace PASTE_YOUR_SUPABASE_KEY_HERE in index.html"); el("loading").style.display="none"; return; }
    db = supabase.createClient(SUPA_URL, SUPA_KEY);
    init();
  } catch(e) { showBanner(e.message); }
};
script.onerror = function() { showBanner("Failed to load Supabase. Check internet."); };
document.head.appendChild(script);

function init() {
  if (isUnlocked) showUpload();
  if (isAdmin) showAdminUI();
  fetchPhotos();

  el("unlock-btn").addEventListener("click", tryUnlock);
  el("class-pw").addEventListener("keydown", function(e){ if(e.key==="Enter") tryUnlock(); });

  el("dropzone").addEventListener("click", function(){ el("file-input").click(); });
  el("dropzone").addEventListener("dragover", function(e){ e.preventDefault(); this.classList.add("drag"); });
  el("dropzone").addEventListener("dragleave", function(){ this.classList.remove("drag"); });
  el("dropzone").addEventListener("drop", function(e){
    e.preventDefault(); this.classList.remove("drag");
    updateDropTxt(e.dataTransfer.files.length);
    el("file-input").files = e.dataTransfer.files;
  });
  el("file-input").addEventListener("change", function(){ updateDropTxt(this.files.length); });
  el("upload-btn").addEventListener("click", doUpload);
  el("search").addEventListener("input", function(){ filterPhotos(this.value); });

  el("lb-close").addEventListener("click", closeLightbox);
  el("lightbox").addEventListener("click", function(e){ if(e.target===this) closeLightbox(); });
  el("dl-btn").addEventListener("click", doDownload);
  el("del-btn").addEventListener("click", function(){ el("del-btn").style.display="none"; el("del-confirm").style.display="flex"; });
  el("del-yes").addEventListener("click", doDelete);
  el("del-no").addEventListener("click", function(){ el("del-confirm").style.display="none"; el("del-btn").style.display="flex"; });

  el("admin-btn").addEventListener("click", function(){ el("admin-modal").style.display="flex"; setTimeout(function(){ el("admin-pw").focus(); },100); });
  el("admin-cancel-btn").addEventListener("click", closeAdminModal);
  el("admin-modal").addEventListener("click", function(e){ if(e.target===this) closeAdminModal(); });
  el("admin-login-btn").addEventListener("click", tryAdmin);
  el("admin-pw").addEventListener("keydown", function(e){ if(e.key==="Enter") tryAdmin(); });

  document.addEventListener("keydown", function(e){ if(e.key==="Escape"){ closeLightbox(); closeAdminModal(); } });
}

async function fetchPhotos() {
  try {
    var res = await db.from("photos").select("*").order("created_at", { ascending: false });
    if (res.error) throw res.error;
    allPhotos = res.data || [];
    renderGallery(allPhotos);
    el("photo-count").textContent = allPhotos.length + " photo" + (allPhotos.length !== 1 ? "s" : "");
  } catch(e) {
    showBanner("Cannot load photos: " + e.message);
    el("loading").style.display = "none";
  }
}

function renderGallery(photos) {
  el("loading").style.display = "none";
  var g = el("gallery"), em = el("empty");
  if (!photos.length) {
    g.style.display = "none"; em.style.display = "block";
    em.querySelector("p").textContent = el("search").value ? "No photos match." : "No memories yet. Be the first to upload!";
    return;
  }
  em.style.display = "none"; g.style.display = "grid";
  g.innerHTML = photos.map(function(p, i) {
    var d = new Date(p.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    return '<div class="pcard fade" style="animation-delay:'+(i*35)+'ms" data-id="'+p.id+'">'
      +'<img src="'+p.public_url+'" alt="" loading="lazy" />'
      +'<div class="pinfo">'+(p.caption?'<p class="pcap">'+p.caption+'</p>':'')
      +'<p class="pdate">'+d+'</p></div></div>';
  }).join("");
  g.querySelectorAll(".pcard").forEach(function(card){
    card.addEventListener("click", function(){ openLightbox(this.dataset.id); });
  });
}

function filterPhotos(q) {
  renderGallery(q ? allPhotos.filter(function(p){ return (p.caption||"").toLowerCase().includes(q.toLowerCase()); }) : allPhotos);
}

function tryUnlock() {
  if (el("class-pw").value === CLASS_PASS) {
    sessionStorage.setItem("cm_unlocked","1"); isUnlocked=true; showUpload();
  } else {
    var r = el("pass-row");
    r.style.animation="none"; r.offsetWidth; r.style.animation="shake .4s ease";
    el("pass-err").style.display="block"; el("class-pw").value="";
  }
}

function showUpload() {
  el("pass-section").style.display="none";
  el("upload-section").style.display="block";
  el("card-sub").textContent="DROP PHOTOS OR TAP TO BROWSE";
}

function updateDropTxt(n) {
  el("drop-txt").textContent = n ? n+" photo"+(n>1?"s":"")+" selected" : "Tap to choose photos";
}

async function doUpload() {
  var files = el("file-input").files;
  if (!files.length) { alert("Please select at least one photo first."); return; }
  var caption = el("caption").value.trim();
  el("upload-btn").disabled=true; el("up-spin").style.display="inline-block";
  el("up-err").style.display="none"; el("up-ok").style.display="none";
  try {
    for (var i=0; i<files.length; i++) {
      var file=files[i], ext=file.name.split(".").pop();
      var name=Date.now()+"-"+Math.random().toString(36).slice(2)+"."+ext;
      var up=await db.storage.from(BUCKET).upload(name,file,{contentType:file.type});
      if(up.error) throw up.error;
      var pub=db.storage.from(BUCKET).getPublicUrl(name).data.publicUrl;
      var ins=await db.from("photos").insert({filename:name,caption:caption||null,public_url:pub});
      if(ins.error) throw ins.error;
    }
    el("file-input").value=""; el("caption").value=""; updateDropTxt(0);
    el("up-ok").style.display="block";
    setTimeout(function(){ el("up-ok").style.display="none"; },3000);
    fetchPhotos();
  } catch(e) {
    el("up-err").textContent="Upload failed: "+e.message; el("up-err").style.display="block";
  } finally {
    el("upload-btn").disabled=false; el("up-spin").style.display="none";
  }
}

function openLightbox(id) {
  currentPhoto=allPhotos.find(function(p){ return p.id===id; });
  if(!currentPhoto) return;
  el("lb-img").src=currentPhoto.public_url;
  el("lb-cap").textContent=currentPhoto.caption||"";
  el("del-btn").style.display=isAdmin?"flex":"none";
  el("del-confirm").style.display="none";
  el("lightbox").style.display="flex";
}

function closeLightbox() { el("lightbox").style.display="none"; currentPhoto=null; }

async function doDownload() {
  if(!currentPhoto) return;
  var res=await fetch(currentPhoto.public_url);
  var blob=await res.blob();
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url; a.download=currentPhoto.filename||"memory.jpg"; a.click();
  URL.revokeObjectURL(url);
}

async function doDelete() {
  if(!currentPhoto) return;
  await db.storage.from(BUCKET).remove([currentPhoto.filename]);
  await db.from("photos").delete().eq("id",currentPhoto.id);
  allPhotos=allPhotos.filter(function(p){ return p.id!==currentPhoto.id; });
  closeLightbox(); renderGallery(allPhotos);
  el("photo-count").textContent=allPhotos.length+" photo"+(allPhotos.length!==1?"s":"");
}

function tryAdmin() {
  if(el("admin-pw").value===ADMIN_PASS) {
    sessionStorage.setItem("cm_admin","1"); isAdmin=true; showAdminUI(); closeAdminModal();
  } else {
    var m=el("admin-modal").querySelector(".modal");
    m.style.animation="none"; m.offsetWidth; m.style.animation="shake .4s ease";
    el("admin-err").style.display="block"; el("admin-pw").value="";
  }
}

function showAdminUI() { el("admin-badge").style.display="inline"; el("admin-btn").style.display="none"; }
function closeAdminModal() { el("admin-modal").style.display="none"; el("admin-pw").value=""; el("admin-err").style.display="none"; }
</script>
</body>
</html>
